<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Clone</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div id="login-overlay" class="overlay" style="display: none;">
        <div class="login-box">
            <h2>Ro'yxatdan o'tish</h2>
            <input type="text" id="login-name" placeholder="Ismingiz">
            <input type="text" id="login-phone" placeholder="Telefon raqamingiz (+998...)">
            <button id="login-btn">Kirish</button>
        </div>
    </div>
    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-id-display">
                    <span id="my-name">Yuklanmoqda...</span>
                </div>
                <input type="text" id="search-input" placeholder="ID orqali qidirish...">
            </header>
            <div class="chat-list" id="chat-list">
                <!-- <div class="chat-item active">
                    <div class="avatar">U</div>
                    <div class="chat-info">
                        <h4>Umumiy Guruh</h4>
                        <p>Oxirgi xabar...</p>
                    </div>
                </div> -->
                <!-- <div class="chat-item">
                    <div class="avatar">U</div>
                    <div class="chat-info">
                        <h4>Muhammad</h4>
                        <p>Oxirgi xabar...</p>
                    </div>
                </div> -->
            </div>
        </aside>

        <main class="main-chat">
            <header class="chat-header">
                <button id="back-btn" class="mobile-only">←</button>
                <div id="chat-avatar" class="avatar"
                    style="width: 40px; height: 40px; margin-right: 10px; background: #2481cc; color: white; display: flex; position: relative;">
                    <span id="chat-avatar-letter" style="margin: auto;">?</span>
                    <div id="header-status-dot" class="status-dot"></div>
                </div>
                <div class="chat-user-info">
                    <h3 id="current-chat-name">...</h3>
                    <p id="status">offline</p>
                </div>
            </header>

            <div class="messages-container" id="messages">
                <!-- <div class="message received">
                    <p>Salom! Loyihani boshladikmni?</p>
                    <span class="time">12:00</span>
                </div>
                <div class="message sent">
                    <p>Ha, albatta</p>
                    <span class="time">12:01</span>
                </div> -->
            </div>

            <div id="image-viewer" class="viewer-modal" style="display: none;">
                <span class="close-viewer">&times;</span>
                <img class="viewer-content" id="full-image">
            </div>

            <footer class="input-area">
                <div id="image-preview-container" style="display: none;">
                    <div class="preview-box">
                        <img id="image-preview-img" src="">
                        <button id="cancel-image-btn">×</button>
                    </div>
                </div>

                <input type="file" id="file-input" style="display: none;" accept="image/*">
                <button id="attach-btn" type="button">📎</button>
                <input type="text" id="msg-input" placeholder="Xabar yozing...">
                <button id="send-btn">Yuborish</button>
            </footer>
        </main>
    </div>
    <!-- <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script> -->
    <script src="./socket.io.js"></script>
    <script src="./app.js"></script>
</body>

</html>
